name: Metadata correction / addition
description: Fix or add information for a paper in the list. Mirrors the papers.yaml schema — fill in only the fields you have.
title: "[Metadata] <paper title>"
labels: ["metadata-correction"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping keep this list accurate. The fields below mirror the
        `papers.yaml` schema. Fill in only the ones you know — everything is
        optional. If you arrived here from the website's "Report issue" button
        on a paper card, the title and the source-line link are already filled
        in below.

  - type: dropdown
    id: kind
    attributes:
      label: Type of report
      options:
        - Metadata is wrong
        - Missing information / want to add a field
        - Suggest a new paper to add
        - Verify / replace BibTeX (set bibtex_confirmed)
        - Other
    validations:
      required: true

  - type: input
    id: paper-title
    attributes:
      label: Paper title
      placeholder: "OSWorld: Benchmarking Multimodal Agents…"
    validations:
      required: true

  - type: input
    id: paper-link
    attributes:
      label: Primary link (`link:` field)
      description: Project homepage > arXiv > venue page. Only one.
      placeholder: https://arxiv.org/abs/2404.07972

  - type: input
    id: source-line
    attributes:
      label: Source location in papers.yaml
      description: Optional. e.g. `papers.yaml#L1234`. Pre-filled if you arrived from the website.

  - type: textarea
    id: details
    attributes:
      label: What is incorrect, missing, or to add?
      description: Describe the issue (e.g., wrong authors, wrong date, missing keyword, broken link). For new papers, paste any details you have.
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ## Optional fields — fill in any you can

  - type: input
    id: authors
    attributes:
      label: Authors
      description: Comma-separated. Include all of them.
      placeholder: "Tianbao Xie, Danyang Zhang, Jixuan Chen, …"

  - type: input
    id: institutions
    attributes:
      label: Institutions
      description: Comma-separated, common abbreviations preferred (OSU, MIT, CMU).
      placeholder: "HKU, OSU, CMU, Salesforce"

  - type: input
    id: date
    attributes:
      label: Date
      description: ISO `YYYY-MM-DD`. If only the month is known use `YYYY-MM`; if only year, `YYYY`. Use the **earliest known public release** (arXiv v1 / first preprint), not the latest revision.
      placeholder: "2024-04-11"

  - type: input
    id: publisher
    attributes:
      label: Publisher / venue
      description: e.g. `NeurIPS 2024`, `ICLR 2025`, `ACL 2024`, `TMLR`, `arXiv`.
      placeholder: "NeurIPS 2024"

  - type: input
    id: envs
    attributes:
      label: Env
      description: One or more of Web, Mobile, Desktop, General GUI. Comma-separated.
      placeholder: "Desktop"

  - type: input
    id: keywords
    attributes:
      label: Keywords
      description: Comma-separated, paper-specific. See `CLAUDE.md` for guidance.
      placeholder: "benchmark, OSWorld"

  - type: textarea
    id: tldr
    attributes:
      label: TLDR
      description: 1–3 sentences, factual and contribution-first.

  - type: input
    id: src-arxiv
    attributes:
      label: sources.arxiv (optional)
      placeholder: https://arxiv.org/abs/2404.07972

  - type: input
    id: src-openreview
    attributes:
      label: sources.openreview (optional)
      placeholder: https://openreview.net/forum?id=…

  - type: input
    id: src-publisher
    attributes:
      label: sources.publisher_page (optional)
      description: ACL Anthology, NeurIPS Proceedings, etc. (Skip when OpenReview is the official page.)
      placeholder: https://aclanthology.org/2024.acl-long.123/

  - type: input
    id: src-homepage
    attributes:
      label: sources.homepage (optional)
      placeholder: https://os-world.github.io/

  - type: input
    id: src-code
    attributes:
      label: sources.code (optional)
      placeholder: https://github.com/org/repo

  - type: input
    id: src-dataset
    attributes:
      label: sources.dataset (optional)
      placeholder: https://huggingface.co/datasets/…

  - type: textarea
    id: bibtex
    attributes:
      label: Verified BibTeX (optional)
      description: Paste an official BibTeX export here if you'd like the entry's `bibtex_confirmed` flipped to `true`.
      render: bibtex
