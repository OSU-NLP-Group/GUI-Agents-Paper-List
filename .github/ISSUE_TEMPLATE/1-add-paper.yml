name: Add a new paper
description: Suggest a paper to add to the list
title: "[Add Paper] <paper title here>"
labels: ["add-paper"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a paper! Please put the **full paper title** in the issue title above (replace `<paper title here>`).

        Fill in as much as you can below — at least one source link is required. The primary `link:` is derived automatically by priority: **homepage → arXiv → OpenReview → publisher page**. Delete any lines you don't have.

  - type: textarea
    id: details
    attributes:
      label: Paper details
      description: |
        **Sources** (at least one required): homepage → arXiv → OpenReview → publisher page → code → dataset
        **Metadata**: authors · institutions · date (earliest public release, YYYY-MM-DD) · publisher (e.g. `ICLR 2025 (Poster)`) · env (Web/Mobile/Desktop/General GUI) · keywords · tldr (1–3 sentences)
      value: |
        sources.homepage:
        sources.arxiv:
        sources.openreview:
        sources.publisher_page:
        sources.code:
        sources.dataset:

        authors:
        institutions:
        date:
        publisher:
        env:
        keywords:
        tldr:

        notes:
    validations:
      required: true
