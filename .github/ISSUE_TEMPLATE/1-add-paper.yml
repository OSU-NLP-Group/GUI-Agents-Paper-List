name: Add a new paper
description: Suggest a paper to add to the list
title: "[Add Paper] "
labels: ["add-paper"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a paper! Only **Title** and **Link** are required. Everything else is optional but strongly encouraged — see the second field for details.

  - type: input
    id: title
    attributes:
      label: Title
      description: The paper's exact, canonical title.
      placeholder: "e.g., OS-ATLAS: A Foundation Action Model for Generalist GUI Agents"
    validations:
      required: true

  - type: input
    id: link
    attributes:
      label: Link
      description: A single link — prefer project homepage > arXiv > OpenReview > publisher page.
      placeholder: "https://arxiv.org/abs/..."
    validations:
      required: true

  - type: textarea
    id: details
    attributes:
      label: Additional details (optional but recommended)
      description: |
        Please include as much as you can — anything missing will be generated by Claude Code, which may introduce errors.

        Recommended to include:
        - **Authors** (complete list, comma-separated)
        - **Institutions** (use abbreviations like OSU, CMU, MIT when known)
        - **Date** (earliest public release, e.g., `October 30, 2024`)
        - **Publisher / venue** (e.g., `arXiv`, `ICLR 2026 (Poster)`, `CVPR 2026`, `Findings of ACL 2026`)
        - **Env** (`[Web]`, `[Mobile]`, `[Desktop]`, or `[General GUI]`)
        - **Suggested keywords** (comma-separated in brackets, e.g., `[benchmark], [GUI grounding], [model]`)
        - **TLDR** (1-3 sentences)
        - **Conflict-of-interest disclosure** if you're an author
      placeholder: |
        Authors: ...
        Institutions: ...
        Date: ...
        Publisher: ...
        Env: ...
        Keywords: ...
        TLDR: ...
