name: Add a new paper
description: Suggest a paper to add to the list
title: "[Add Paper] <paper title here>"
labels: ["add-paper"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a paper! Please put the **full paper title** in the issue title above (replace `<paper title here>`).

        Fill in as much as you can below. At least one source link is required. The primary `link:` in the database is derived automatically: **homepage ‚Üí arXiv ‚Üí OpenReview ‚Üí publisher page**.

  - type: textarea
    id: details
    attributes:
      label: Paper details
      description: |
        Fill in whatever you have ‚Äî the more the better. Unlisted fields will be inferred or left blank.

        **Sources** (at least one required ‚Äî include every link you have):
        - `sources.homepage` ‚Äî project / paper homepage (highest priority for primary link)
        - `sources.arxiv` ‚Äî arXiv abstract page
        - `sources.openreview` ‚Äî OpenReview forum (ICLR / NeurIPS / COLM etc.)
        - `sources.publisher_page` ‚Äî ACL Anthology, NeurIPS Proceedings, CVPR open-access, etc. Skip if OpenReview is the official page.
        - `sources.code` ‚Äî GitHub or other code repo
        - `sources.dataset` ‚Äî HuggingFace, Zenodo, etc.

        **Metadata** (all optional but encouraged):
        - `authors` ‚Äî full list, comma-separated, in paper order
        - `institutions` ‚Äî comma-separated, use abbreviations (OSU, CMU, MIT, FAIR, ‚Ä¶)
        - `date` ‚Äî earliest public release (arXiv v1 / first preprint). Format: `YYYY-MM-DD`, `YYYY-MM`, or `YYYY`
        - `publisher` ‚Äî `arXiv`, `ICLR 2025 (Poster)`, `NeurIPS 2024 (Oral)`, `ACL 2025`, `TMLR`, ‚Ä¶
        - `env` ‚Äî one or more of: `Web`, `Mobile`, `Desktop`, `General GUI`
        - `keywords` ‚Äî paper abbreviation + artifact type (benchmark/model/dataset/framework/survey) + 1‚Äì3 technical concepts
        - `tldr` ‚Äî 1‚Äì3 sentences: what problem, what contribution, what result
        - `notes` ‚Äî COI disclosure if you're an author, scope notes, etc.
      placeholder: |
        sources.homepage: https://os-world.github.io/
        sources.arxiv: https://arxiv.org/abs/2404.07972
        sources.openreview:
        sources.publisher_page:
        sources.code: https://github.com/xlang-ai/OSWorld
        sources.dataset: https://huggingface.co/datasets/xlangai/osworld

        authors: Tianbao Xie, Danyang Zhang, ‚Ä¶
        institutions: HKU, OSU, CMU, Salesforce
        date: 2024-04-11
        publisher: NeurIPS 2024
        env: Desktop
        keywords: OSWorld, benchmark, visual grounding
        tldr: Introduces OSWorld, a scalable real-OS environment‚Ä¶

        notes:
    validations:
      required: true
