name: Report an error or metadata correction
description: Wrong author/institution/date/publisher/keyword/env, broken link, BibTeX fix, etc.
title: "[Metadata] <paper title here>"
labels: ["metadata-correction"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping keep this list accurate! Please put the **full paper title** in the issue title above.

        Describe what is wrong and provide corrected values below. Delete any lines you don't need.

  - type: textarea
    id: details
    attributes:
      label: Correction details
      description: |
        **What is wrong / what to fix** (required): describe the issue and the correct value.
        **Corrected metadata** (fill in only what you know): authors · institutions · date · publisher · env · keywords · tldr · sources
      value: |
        paper_link:
        what_is_wrong:

        authors:
        institutions:
        date:
        publisher:
        env:
        keywords:
        tldr:

        sources.homepage:
        sources.arxiv:
        sources.openreview:
        sources.publisher_page:
        sources.code:
        sources.dataset:
        bibtex_verified: |

        notes:
    validations:
      required: true
