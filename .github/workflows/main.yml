name: Update README with Sorted Papers Content

on:
  push:
    paths:
      - 'ALL_PAPERS.md'
      - 'update_template_or_data/utils/scripts/sort_by_date.py'
      - 'update_template_or_data/update_readme_template.md'
      - '.github/workflows/main.yml'

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Git LFS
        run: git lfs install

      - name: Set up Python environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install pandas matplotlib wordcloud

      - name: Run sort_by_date.py
        run: python update_template_or_data/utils/scripts/sort_by_date.py

      - name: Assemble README from template
        run: |
          # Insert env grouping
          ENVS=$(cat update_template_or_data/env_grouping.md 2>/dev/null || echo "No env data available")
          sed -i '/{{insert_env_groups_here}}/{
            r /dev/stdin
            d
          }' update_template_or_data/update_readme_template.md <<< "$ENVS"

          # Insert keyword grouping
          KEYWORDS=$(cat update_template_or_data/keyword_grouping.md 2>/dev/null || echo "No keywords available")
          sed -i '/{{insert_keyword_groups_here}}/{
            r /dev/stdin
            d
          }' update_template_or_data/update_readme_template.md <<< "$KEYWORDS"

          # Insert author grouping
          AUTHORS=$(cat update_template_or_data/author_grouping.md 2>/dev/null || echo "No authors available")
          sed -i '/{{insert_author_groups_here}}/{
            r /dev/stdin
            d
          }' update_template_or_data/update_readme_template.md <<< "$AUTHORS"

          # Insert recent papers
          PAPERS=$(cat update_template_or_data/recent_paper_list.md)
          sed -i '/{{insert_recent_papers_here}}/{
            r /dev/stdin
            d
          }' update_template_or_data/update_readme_template.md <<< "$PAPERS"

          # Overwrite README
          cp update_template_or_data/update_readme_template.md README.md

      - name: Commit changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add README.md ALL_PAPERS.md paper_by_env paper_by_author paper_by_key update_template_or_data/statistics
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "auto updates by github workflow"
            git push
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
